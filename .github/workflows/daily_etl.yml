name: Manual ETL Process

on:
  workflow_dispatch: 
  # schedule:
  # - cron: '15 6 * * *'

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Merge and Upload ETL
        env:
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_VALUE: ${{ secrets.SHAREPOINT_VALUE }}
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}

          HR_CYCLE_FOLDER: ${{ secrets.HR_CYCLE_FOLDER }}
          TRANSFORMED_RESPONSES_FOLDER: ${{ secrets.TRANSFORMED_RESPONSES_FOLDER }}
          COMBINED_RESPONSES_FOLDER: ${{ secrets.COMBINED_RESPONSES_FOLDER }}
          PYTHONPATH: src
        run: python src/performance_dashboard/services/create_and_upload_combined_df.py